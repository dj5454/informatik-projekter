<style>
    @keyframes bob{
        0%{
            scale: 1;
        }

        50%{
            scale: 1.01;
        }

        100%{
            scale: 1;
        }
        
    }
</style>

<main>
    <h2 style="background-color: cornsilk;
     border-radius: 10px;
        
       padding: 10px;
       margin-bottom: 20px;"
       >Byg din egen and!</h2>


    <img style="width: 500px; 
    border-radius: 1000px;
    
    box-shadow: 0px 0px 30px blue;
    animation: bob 2s ease-in-out infinite" 
    src="Images/mystery.png" alt="">

    



    <h3 style="position: absolute;
    translate:-70px -470px;"
    >Farve:</h3>

    <input type="text" placeholder=" Vælg farve" style=
    "position: absolute;
    width: 80px;
    translate: -320px -440px;
    border: 2px outset black ;" readonly>



    <h3 style="position: absolute;
    translate: 470px -470px;"
    >Størrelse:</h3>

    <input type="text" placeholder=" Vælg størrelse" style=
    "position: absolute;
    width: 100px;
    translate: 220px -440px;
    border: 2px outset black ;" readonly>



    <h3 style="position: absolute;
    translate: -70px -40px;"
    >Smykker:</h3>

    <input type="text" placeholder=" Vælg smykker" style=
    "position: absolute;
    width: 100px;
    translate: -320px -10px;
    border: 2px outset black ;
    display: inline;" readonly>


    <h3 style="position: absolute;
    translate: 450px -40px;"
    >Tøj:</h3>

    <input type="text" placeholder=" Vælg tøj" style=
    "position: absolute;
    width: 80px;
    translate: 200px -10px;
    border: 2px outset black ;
    display: inline;" readonly>
